<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Böteslapp-tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --text: #f0ede8;
    --muted: #888;
    --accent: #e8c14a;
    --accent-dim: rgba(232,193,74,0.12);
    --danger: #e05a4a;
    --danger-dim: rgba(224,90,74,0.12);
    --radius: 14px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo-icon {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-icon svg { width: 22px; height: 22px; }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
    color: var(--text);
    line-height: 1;
  }

  header p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Main layout */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  /* Summary bar */
  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem 1.25rem;
  }

  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--text);
    line-height: 1;
  }

  .stat-value.accent { color: var(--accent); }

  /* Add person */
  .add-row {
    display: flex;
    gap: 10px;
    margin-bottom: 2rem;
  }

  input[type="text"] {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.75rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]::placeholder { color: var(--muted); }

  input[type="text"]:focus {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .btn-add {
    background: var(--accent);
    color: #111;
    border: none;
    border-radius: var(--radius-sm);
    padding: 0.75rem 1.25rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn-add:hover { opacity: 0.88; }
  .btn-add:active { transform: scale(0.97); }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
  }

  /* Person card */
  .person-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem 1.25rem 1.25rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    position: relative;
    transition: border-color 0.2s, background 0.2s;
    animation: cardIn 0.25s ease forwards;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .person-card:hover { border-color: var(--border-hover); }
  .person-card.is-danger { border-color: rgba(224,90,74,0.35); background: #1c1512; }

  .avatar {
    width: 52px; height: 52px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  .person-name {
    font-size: 15px;
    font-weight: 500;
    text-align: center;
    color: var(--text);
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .ticket-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    line-height: 1;
    color: var(--text);
    transition: transform 0.12s ease, color 0.25s;
  }

  .ticket-count.bump { animation: bump 0.18s ease; }
  @keyframes bump { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); } }

  .ticket-count.danger { color: var(--danger); }

  .ticket-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-top: -6px;
  }

  /* Stepper */
  .stepper {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }

  .step-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s, border-color 0.12s, transform 0.1s;
    user-select: none;
  }

  .step-btn:hover { background: var(--surface2); border-color: var(--border-hover); }
  .step-btn:active { transform: scale(0.9); }
  .step-btn.plus:hover { border-color: var(--accent); color: var(--accent); }
  .step-btn.minus:hover { border-color: var(--danger); color: var(--danger); }

  /* Remove */
  .remove-btn {
    position: absolute; top: 10px; right: 10px;
    width: 24px; height: 24px; border-radius: 50%;
    border: 1px solid transparent;
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    font-size: 14px;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }

  .remove-btn:hover {
    background: var(--danger-dim);
    color: var(--danger);
    border-color: rgba(224,90,74,0.3);
  }

  /* Empty */
  .empty {
    text-align: center;
    padding: 4rem 0;
    color: var(--muted);
  }

  .empty svg { opacity: 0.25; margin-bottom: 1rem; }
  .empty p { font-size: 15px; }

  /* Badge on danger */
  .badge-danger {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    background: var(--danger-dim);
    color: var(--danger);
    border: 1px solid rgba(224,90,74,0.3);
    border-radius: 20px;
    padding: 2px 8px;
    font-weight: 600;
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 2rem;
    font-size: 12px;
    color: #444;
    border-top: 1px solid var(--border);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

  @media (max-width: 600px) {
    header { padding: 1rem; }
    main { padding: 1.5rem 1rem 3rem; }
    .summary { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stat-value { font-size: 26px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="3" width="16" height="18" rx="2"/>
      <line x1="8" y1="8" x2="16" y2="8"/>
      <line x1="8" y1="12" x2="16" y2="12"/>
      <line x1="8" y1="16" x2="12" y2="16"/>
    </svg>
  </div>
  <div>
    <h1>Böteslapp-tracker</h1>
    <p>Håll koll på vem som fått flest böter</p>
  </div>
</header>

<main>
  <div class="summary">
    <div class="stat-card">
      <div class="stat-label">Antal personer</div>
      <div class="stat-value" id="stat-people">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Totalt böter</div>
      <div class="stat-value accent" id="stat-total">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Flest böter</div>
      <div class="stat-value" id="stat-most" style="font-size:20px; padding-top:6px;">—</div>
    </div>
  </div>

  <div class="add-row">
    <input type="text" id="name-input" placeholder="Skriv ett namn..." maxlength="30" />
    <button class="btn-add" onclick="addPerson()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Lägg till
    </button>
  </div>

  <div class="grid" id="grid"></div>

  <div class="empty" id="empty">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    <p>Inga personer tillagda ännu.<br>Lägg till någon ovan för att börja.</p>
  </div>
</main>

<footer>Böteslapp-tracker &mdash; håll koll på strafflapparna</footer>

<script>
const people = [];
const colors = [
  ['#2a2010','#e8c14a'], // amber
  ['#1a1220','#b89ef5'], // purple
  ['#0f1d1a','#4ecfa6'], // teal
  ['#1d1010','#e05a4a'], // red
  ['#0f1720','#4a9fe0'], // blue
  ['#121d10','#7ac952'], // green
  ['#1d1018','#e06aaa'], // pink
];
let ci = 0;

function initials(name) {
  return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2) || '?';
}

function addPerson() {
  const input = document.getElementById('name-input');
  const name = input.value.trim();
  if (!name) { input.focus(); return; }
  const [bg, fg] = colors[ci % colors.length]; ci++;
  people.push({ id: Date.now(), name, tickets: 0, bg, fg });
  input.value = '';
  render();
  input.focus();
}

function change(id, delta) {
  const p = people.find(x => x.id === id);
  if (!p) return;
  p.tickets = Math.max(0, p.tickets + delta);
  render();
  const el = document.getElementById('count-' + id);
  if (el) {
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
  }
}

function remove(id) {
  const idx = people.findIndex(x => x.id === id);
  if (idx !== -1) people.splice(idx, 1);
  render();
}

function render() {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  empty.style.display = people.length ? 'none' : 'block';

  const total = people.reduce((s, p) => s + p.tickets, 0);
  document.getElementById('stat-people').textContent = people.length;
  document.getElementById('stat-total').textContent = total;
  const top = people.length ? people.reduce((a, b) => b.tickets > a.tickets ? b : a) : null;
  const mostEl = document.getElementById('stat-most');
  if (top && top.tickets > 0) {
    mostEl.textContent = top.name.split(' ')[0];
    mostEl.style.fontSize = top.name.split(' ')[0].length > 8 ? '15px' : '20px';
  } else {
    mostEl.textContent = '—';
    mostEl.style.fontSize = '20px';
  }

  grid.innerHTML = people.map(p => `
    <div class="person-card${p.tickets >= 5 ? ' is-danger' : ''}" id="card-${p.id}">
      <button class="remove-btn" onclick="remove(${p.id})" title="Ta bort">✕</button>
      <div class="avatar" style="background:${p.bg};color:${p.fg}">${initials(p.name)}</div>
      <div class="person-name" title="${p.name}">${p.name}</div>
      ${p.tickets >= 5 ? '<span class="badge-danger">Varning</span>' : ''}
      <div class="ticket-count${p.tickets >= 5 ? ' danger' : ''}" id="count-${p.id}">${p.tickets}</div>
      <div class="ticket-label">böteslapp${p.tickets !== 1 ? 'ar' : ''}</div>
      <div class="stepper">
        <button class="step-btn minus" onclick="change(${p.id}, -1)" title="Minska">−</button>
        <button class="step-btn plus" onclick="change(${p.id}, 1)" title="Öka">+</button>
      </div>
    </div>
  `).join('');
}

document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addPerson();
});

render();
</script>
</body>
</html>
