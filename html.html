<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Böteslapp-tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --text: #f0ede8;
    --muted: #888;
    --accent: #e8c14a;
    --accent-dim: rgba(232,193,74,0.12);
    --danger: #e05a4a;
    --danger-dim: rgba(224,90,74,0.12);
    --radius: 14px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo-icon {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-icon svg { width: 22px; height: 22px; }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
    color: var(--text);
    line-height: 1;
  }

  header p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem 1.25rem;
  }

  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--text);
    line-height: 1;
  }

  .stat-value.accent { color: var(--accent); }

  .add-row {
    display: flex;
    gap: 10px;
    margin-bottom: 2rem;
  }

  input[type="text"] {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.75rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]::placeholder { color: var(--muted); }

  input[type="text"]:focus {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .btn-add {
    background: var(--accent);
    color: #111;
    border: none;
    border-radius: var(--radius-sm);
    padding: 0.75rem 1.25rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn-add:hover { opacity: 0.88; }
  .btn-add:active { transform: scale(0.97); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
  }

  .person-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem 1.25rem 1.25rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    position: relative;
    transition: border-color 0.2s, background 0.2s;
    animation: cardIn 0.25s ease forwards;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .person-card:hover { border-color: var(--border-hover); }
  .person-card.is-danger { border-color: rgba(224,90,74,0.35); background: #1c1512; }

  .avatar {
    width: 52px; height: 52px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  .person-name {
    font-size: 15px;
    font-weight: 500;
    text-align: center;
    color: var(--text);
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .ticket-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    line-height: 1;
    color: var(--text);
    transition: transform 0.12s ease, color 0.25s;
  }

  .ticket-count.bump { animation: bump 0.18s ease; }
  @keyframes bump { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); } }

  .ticket-count.danger { color: var(--danger); }

  .ticket-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-top: -6px;
  }

  .stepper {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }

  .step-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size
